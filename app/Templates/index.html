<!DOCTYPE html>
<html>
<body>

  <h2>Digite sua idade:</h2>

  <input type="number" id="idade">
  <button onclick="mostrar()">Enviar</button>

  <p id="resposta"></p>

  <script>
    function mostrar() {
      let idade = document.getElementById('idade').value
      document.getElementById('resposta').textContent = 'Sua idade é: ' + idade
    }
  </script>

</body>
</html>
