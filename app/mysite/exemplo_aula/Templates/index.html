<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificação de Idade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body">

          <h2 class="mb-4">Verificação de Idade</h2>

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Informe sua idade:</label>
              <input type="number" class="form-control" name="idade" min="0" required>
            </div>
            <button class="btn btn-primary w-100">Verificar</button>
          </form>

          {% if mensagem %}
          <div class="alert alert-success mt-4">
            <p>{{ mensagem }}</p>
          </div>
          {% endif %}

        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
